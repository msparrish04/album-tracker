<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Album Tracker</title>
    <link rel="stylesheet" href="style.css" />

    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.default.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
</head>

<body>

    <header>
        <h1>Album Tracker</h1>
        <br>
        <div id="stats"></div>
    </header>

    <main>
        <section class="add-album">
            <h2>Add an album</h2>
            <form id="album-form">
                <input type="text" id="title" placeholder="Album title" required />
                <input type="text" id="artist" placeholder="Artist" required />
                <select id="genre">
                    <option value="">Genre (optional)</option>
                    <option value="Ambient">Ambient</option>
                    <option value="Blues">Blues</option>
                    <option value="Classical">Classical</option>
                    <option value="Country">Country</option>
                    <option value="Electronic">Electronic</option>
                    <option value="Folk">Folk</option>
                    <option value="Indie">Indie</option>
                    <option value="Jazz">Jazz</option>
                    <option value="Metal">Metal</option>
                    <option value="Pop">Pop</option>
                    <option value="R&B">R&B</option>
                    <option value="Rap">Rap</option>
                    <option value="Reggae">Reggae</option>
                    <option value="Rock">Rock</option>
                    <option value="Soul">Soul</option>
                </select> <input type="number" id="duration" placeholder="Duration in minutes" min="1" />
                <textarea id="notes" placeholder="Notes (optional)"></textarea>
                <button type="submit">Add album</button>
            </form>
        </section>

        <section class="album-list">
            <h2>Your list</h2>
            <div class="controls">
                <input type="text" id="search" placeholder="Search by title or artist..." />
                <select id="sort">
                    <option value="">Sort by...</option>
                    <option value="title">Title</option>
                    <option value="artist">Artist</option>
                    <option value="duration">Duration</option>
                    <option value="genre">Genre</option>
                </select>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="unlistened">Not yet listened</button>
                    <button class="filter-btn" data-filter="listened">Listened</button>
                </div>
            </div>
            <div id="albums"></div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
